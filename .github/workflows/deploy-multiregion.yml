name: Deploy to Multi-Region

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [uae, saudi, qatar]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t salon-backend:${{ github.sha }} -f output/Dockerfile ./output
          docker tag salon-backend:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/salon-backend:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/salon-backend:${{ github.sha }}
      
      - name: Deploy to EKS (${{ matrix.region }})
        run: |
          aws eks update-kubeconfig --region ${{ matrix.region == 'uae' && 'me-south-1' || 'me-central-1' }} --name salon-backend-${{ matrix.region }}
          helm upgrade --install salon-backend ./k8s/helm \
            --set image.tag=${{ github.sha }} \
            --set region=${{ matrix.region }} \
            --namespace salon-backend \
            --create-namespace

  sync-database:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Sync across regions
        run: |
          # Run MongoDB sync job
          kubectl create job --from=cronjob/mongo-sync mongo-sync-$(date +%s)
          
          # Wait for sync completion
          kubectl wait --for=condition=complete job/mongo-sync-$(date +%s)
