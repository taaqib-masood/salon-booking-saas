```yaml
version: '3'
services:
  api:
    build: ./api
    command: npm run start:dev
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/mydatabase
    networks:
      - app-network
  mongodb:
    image: mongo
    volumes:
      - dbdata:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network
  redis:
    image: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - app-network
  nginx:
    build: ./nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - app-network
  mongo-express:
    image: mongo-express
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_SERVER: mongodb
    networks:
      - app-network
volumes:
  dbdata:
  redisdata:
networks:
  app-network:
    driver: bridge
```