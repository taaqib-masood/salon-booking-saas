
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: salon-api-hpa
  namespace: salon-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: salon-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
