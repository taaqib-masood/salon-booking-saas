services:
  - type: web
    name: salon-booking-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        fromService:
          type: redis
          name: salon-redis
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DEFAULT_TENANT_ID
        sync: false
      - key: DEFAULT_BRANCH_ID
        sync: false
      - key: VAT_RATE
        value: "0.05"

  - type: redis
    name: salon-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
